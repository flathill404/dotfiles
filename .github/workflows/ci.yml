name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — read-only content access
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Shell script linting
  # ─────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y --no-install-recommends shellcheck

      - name: Lint all shell scripts
        run: |
          echo "=== ShellCheck ==="
          # Lint every executable bash script under scripts/
          find scripts -maxdepth 1 -type f -name '*.sh' | sort | while IFS= read -r f; do
            echo "  Linting: $f"
            shellcheck --severity=warning "$f"
          done

  # ─────────────────────────────────────────────
  # 2. Config file syntax validation
  # ─────────────────────────────────────────────
  validate-configs:
    name: Validate Config Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON/JSONC files
        run: |
          echo "=== JSON/JSONC validation ==="
          # json5 handles standard JSON as well as JSONC (comments, trailing commas)
          # claude/.claude/settings.json uses JSONC format (// comments)
          pip3 install --quiet json5
          find . -name '*.json' ! -path './.git/*' | sort | while IFS= read -r f; do
            echo "  Checking: $f"
            python3 -c "import json5, sys; json5.load(open(sys.argv[1]))" "$f"
            echo "  OK"
          done

      - name: Validate TOML files
        run: |
          echo "=== TOML validation ==="
          VALIDATE_TOML='
          import sys
          try:
              import tomllib
          except ImportError:
              import subprocess, sys as _sys
              subprocess.check_call([_sys.executable, "-m", "pip", "install", "-q", "tomli"])
              import tomli as tomllib
          for path in sys.argv[1:]:
              with open(path, "rb") as fh:
                  tomllib.load(fh)
              print(f"  OK: {path}")
          '
          mapfile -t toml_files < <(find . -name '*.toml' ! -path './.git/*' | sort)
          # Also validate .prototools (TOML format but no .toml extension)
          python3 -c "$VALIDATE_TOML" "${toml_files[@]}" proto/.prototools

      - name: Validate git config syntax
        run: |
          echo "=== git config validation ==="
          git config --file git/.gitconfig --list > /dev/null
          echo "  OK: git/.gitconfig"

      - name: Validate Brewfile Ruby syntax
        run: |
          echo "=== Brewfile syntax ==="
          ruby -c brew/.Brewfile
          echo "  OK"

  # ─────────────────────────────────────────────
  # 3. Secret-scanning guard (prevent regression)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Refuse private-key files in working tree
        run: |
          echo "=== Forbidden file patterns ==="
          BAD=$(find . \
            -path ./.git -prune -o \
            -type f \( \
              -name 'private-key*' -o \
              -name 'id_rsa' -o -name 'id_ed25519' -o -name 'id_ecdsa' -o \
              -name '*.pem' -o -name '*.key' -o -name 'secret.gpg' \
            \) -print)
          if [ -n "$BAD" ]; then
            echo "ERROR: Forbidden secret-like files present:"
            echo "$BAD"
            exit 1
          fi
          echo "OK: no secret-like files in working tree"

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 4. GNU Stow dry-run (conflict detection)
  # ─────────────────────────────────────────────
  stow-simulate:
    name: Stow Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install GNU Stow
        run: sudo apt-get install -y --no-install-recommends stow

      - name: Simulate stow (all home-targeting packages, --no-folding)
        run: |
          STOW_TARGET=$(mktemp -d)
          # Pre-create real ~/.config subdirs (matches setup.sh prepare_directories)
          mkdir -p "$STOW_TARGET/.config"/{git,ghostty,karabiner,starship}
          echo "Target: $STOW_TARGET"

          for pkg in zsh git tmux starship ghostty brew proto ssh claude karabiner; do
            echo "  Simulating: $pkg"
            stow --simulate --no-folding --target="$STOW_TARGET" "$pkg"
            echo "  OK"
          done

          echo "  Skipping: vscode (macOS Library path — tested in macos-arm job)"

  # ─────────────────────────────────────────────
  # 5. macOS Apple Silicon validation
  # ─────────────────────────────────────────────
  macos-arm:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-latest  # Apple Silicon M-series runner
    steps:
      - uses: actions/checkout@v6

      - name: Confirm ARM64 architecture
        run: |
          arch_name=$(uname -m)
          echo "Architecture: $arch_name"
          if [ "$arch_name" != "arm64" ]; then
            echo "ERROR: Expected arm64 runner, got $arch_name"
            exit 1
          fi

      - name: Verify Homebrew (ARM)
        run: |
          brew --version
          test -x /opt/homebrew/bin/brew && echo "  Homebrew at /opt/homebrew (ARM) OK"

      - name: Validate zsh script syntax
        run: |
          echo "=== zsh syntax check ==="
          zsh -n zsh/.zshenv && echo "  .zshenv OK"
          zsh -n zsh/.zshrc  && echo "  .zshrc OK"

      - name: Validate bash script syntax
        run: |
          echo "=== bash syntax check ==="
          for f in scripts/*.sh; do
            bash -n "$f" && echo "  $f OK"
          done

      - name: Validate Brewfile (dry-run)
        run: |
          echo "=== Brewfile dry-run ==="
          brew bundle --file=brew/.Brewfile --dry-run 2>&1 | head -100 || true
          echo "=== Brewfile dry-run complete ==="

      - name: Stow dry-run (macOS paths)
        run: |
          brew install stow --quiet
          STOW_TARGET=$(mktemp -d)
          mkdir -p "$STOW_TARGET/.config"/{git,ghostty,karabiner,starship}

          echo "=== Stow simulate on macOS ==="
          for pkg in zsh git tmux starship ghostty brew proto ssh claude karabiner; do
            echo "  Simulating: $pkg"
            stow --simulate --no-folding --target="$STOW_TARGET" "$pkg"
            echo "  OK"
          done

          VSCODE_TARGET=$(mktemp -d)
          echo "  Simulating: vscode (against temp target)"
          stow --simulate --no-folding --target="$VSCODE_TARGET" vscode
          echo "  OK"
