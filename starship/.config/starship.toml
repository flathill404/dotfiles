# ── Format (only list modules you use — everything else is disabled) ─────────
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$package\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"

# ── Performance ──────────────────────────────────────────────────────────────
scan_timeout = 30
command_timeout = 500

# ── Character ────────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
read_only = " 󰌾"
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
truncation_length = 30
truncation_symbol = "..."

[git_status]
ahead = "⇡${count}"
behind = "⇢${count}"
diverged = "⇕⇡${ahead_count}⇢${behind_count}"
stashed = "≡${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"
style = "bold red"

[git_commit]
tag_symbol = "  "
only_detached = true

# ── Languages ────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = "󱘗 "

[golang]
symbol = " "

# ── Docker ───────────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
only_with_files = true
style = "bold blue"

# ── Package ──────────────────────────────────────────────────────────────────
[package]
symbol = "󰏗 "

# ── Command Duration ─────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold yellow"

# ── Time (right prompt) ─────────────────────────────────────────────────────
[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M"
style = "dimmed white"
